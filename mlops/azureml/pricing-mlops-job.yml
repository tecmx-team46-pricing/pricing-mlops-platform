$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: pricing-mlops-flow
experiment_name: pricing-mlops
description: Minimal Pricing MLOps flow over shared masked input.
code: ../pricing-mlops-source
command: >-
  python -m pip install -e . &&
  MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
  AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
  MLOPS_TRIGGER_TYPE=${{inputs.trigger_type}}
  MODEL_REPO_GITHUB=${{inputs.model_repo}}
  MODEL_REPO_REF=${{inputs.model_ref}}
  MODEL_REPO_COMMIT_SHA=${{inputs.model_commit_sha}}
  python scripts/run_azure_ml_flow.py
  --storage-account ${{inputs.storage_account}}
  --environment ${{inputs.environment}}
  --run-owner ${{inputs.run_owner}}
  --compute-target azure-ml
  --run-id ${{inputs.run_id}}
  --input-blob-path ${{inputs.input_blob_path}}
  --output-root outputs
environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
  conda_file: environment.yml
identity:
  type: user_identity
inputs:
  storage_account: mlopsstorageexample
  environment: staging
  run_owner: team46
  run_id: manual
  input_blob_path: samples/sample_pricing_v1.csv
  trigger_type: manual
  model_repo: tecmx-team46-pricing/pricing-mlops
  model_ref: PoC/model-flow-template
  model_commit_sha: unknown
  job_identity_client_id: ''
environment_variables:
  MLOPS_COMPUTE_TARGET: azure-ml
  MLOPS_CONTAINER_RAW_MASKED: raw-masked
  MLOPS_CONTAINER_CURATED: curated
  MLOPS_CONTAINER_RUNS: runs
  MLOPS_CONTAINER_SNAPSHOTS: snapshots
  MLOPS_CONTAINER_DRIFT_LOGS: drift-logs
  MLOPS_CONTAINER_REPORTS: reports
  MLOPS_CONTAINER_ARTIFACTS: artifacts
