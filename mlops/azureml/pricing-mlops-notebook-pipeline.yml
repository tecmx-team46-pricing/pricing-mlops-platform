$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: pricing-mlops-auth-monitoring-pipeline
experiment_name: pricing-mlops
description: Pricing MLOps AUTH monitoring pipeline with visible notebook-derived steps and platform-owned publishing.
inputs:
  storage_account: mlopsstorageexample
  environment: staging
  run_owner: team46
  run_id: manual
  input_blob_path: samples/sample_pricing_v1.csv
  baseline_snapshot_container: artifacts
  baseline_snapshot_blob_path: ''
  current_history_container: raw-masked
  current_history_blob_path: samples/sample_pricing_v1.csv
  trigger_type: manual
  model_repo: tecmx-team46-pricing/pricing-mlops
  model_ref: PoC/model-flow-template
  model_commit_sha: unknown
  job_identity_client_id: ''
  sql_enabled: 'false'
  sql_server: ''
  sql_database: ''
  sql_schema: dbo
  sql_run_log_table: model_run_log
  sql_snapshot_table: model_output_snapshot_metadata
  artifact_sinks: azure_blob
  optional_artifact_sinks: azure_ml,sql_metadata
jobs:
  validate_prepare:
    type: command
    compute: azureml:serverless
    component:
      type: command
      name: pricing_mlops_validate_prepare
      display_name: validate_prepare
      code: ../pricing-mlops-source
      command: >-
        python -m pip install -e . &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python scripts/components/validate_prepare.py
        --storage-account ${{inputs.storage_account}}
        --input-container raw-masked
        --input-blob-path ${{inputs.input_blob_path}}
        --output-dir outputs/prepared_data
        --prepared-container artifacts
        --prepared-prefix component-state/${{inputs.run_id}}/prepared
      environment:
        image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
        conda_file: environment.yml
      inputs:
        storage_account:
          type: string
        input_blob_path:
          type: string
        run_id:
          type: string
        job_identity_client_id:
          type: string
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      input_blob_path: ${{parent.inputs.input_blob_path}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
    identity:
      type: user_identity
  build_monitoring_inputs:
    type: command
    compute: azureml:serverless
    depends_on:
      - validate_prepare
    component:
      type: command
      name: pricing_mlops_build_monitoring_inputs
      display_name: build_monitoring_inputs
      code: ../pricing-mlops-source
      command: >-
        python -m pip install -e . &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python scripts/components/build_monitoring_inputs.py
        --baseline-snapshot-path outputs/_downloaded/baseline_recommendation_snapshot.csv
        --current-history-path outputs/_downloaded/current_auth_history_snapshot_real.csv
        --output-dir outputs/monitoring_inputs
        --run-id ${{inputs.run_id}}
        --storage-account ${{inputs.storage_account}}
        --baseline-snapshot-container ${{inputs.baseline_snapshot_container}}
        --baseline-snapshot-blob-path ${{inputs.baseline_snapshot_blob_path}}
        --current-history-container ${{inputs.current_history_container}}
        --current-history-blob-path ${{inputs.current_history_blob_path}}
        --monitoring-inputs-container artifacts
        --monitoring-inputs-prefix component-state/${{inputs.run_id}}/monitoring_inputs
      environment:
        image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
        conda_file: environment.yml
      inputs:
        storage_account:
          type: string
        run_id:
          type: string
        baseline_snapshot_container:
          type: string
        baseline_snapshot_blob_path:
          type: string
        current_history_container:
          type: string
        current_history_blob_path:
          type: string
        job_identity_client_id:
          type: string
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      baseline_snapshot_container: ${{parent.inputs.baseline_snapshot_container}}
      baseline_snapshot_blob_path: ${{parent.inputs.baseline_snapshot_blob_path}}
      current_history_container: ${{parent.inputs.current_history_container}}
      current_history_blob_path: ${{parent.inputs.current_history_blob_path}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
    identity:
      type: user_identity
  calculate_recommendation_validity:
    type: command
    compute: azureml:serverless
    depends_on:
      - build_monitoring_inputs
    component:
      type: command
      name: pricing_mlops_calculate_recommendation_validity
      display_name: calculate_recommendation_validity
      code: ../pricing-mlops-source
      command: >-
        python -m pip install -e . &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python scripts/components/calculate_recommendation_validity.py
        --input-dir outputs/monitoring_inputs
        --output-dir outputs/recommendation_validity
        --storage-account ${{inputs.storage_account}}
        --monitoring-inputs-container artifacts
        --monitoring-inputs-prefix component-state/${{inputs.run_id}}/monitoring_inputs
        --validity-container artifacts
        --validity-prefix component-state/${{inputs.run_id}}/recommendation_validity
      environment:
        image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
        conda_file: environment.yml
      inputs:
        storage_account:
          type: string
        run_id:
          type: string
        job_identity_client_id:
          type: string
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
    identity:
      type: user_identity
  calculate_operational_decision:
    type: command
    compute: azureml:serverless
    depends_on:
      - calculate_auth_history_drift
    component:
      type: command
      name: pricing_mlops_calculate_operational_decision
      display_name: calculate_operational_decision
      code: ../pricing-mlops-source
      command: >-
        python -m pip install -e . &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python scripts/components/calculate_operational_decision.py
        --input-dir outputs/auth_history_drift
        --output-dir outputs/operational_decision
        --run-id ${{inputs.run_id}}
        --storage-account ${{inputs.storage_account}}
        --validity-container artifacts
        --validity-prefix component-state/${{inputs.run_id}}/auth_history_drift
        --decision-container artifacts
        --decision-prefix component-state/${{inputs.run_id}}/operational_decision
      environment:
        image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
        conda_file: environment.yml
      inputs:
        storage_account:
          type: string
        run_id:
          type: string
        job_identity_client_id:
          type: string
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
    identity:
      type: user_identity
  calculate_auth_history_drift:
    type: command
    compute: azureml:serverless
    depends_on:
      - calculate_recommendation_validity
    component:
      type: command
      name: pricing_mlops_calculate_auth_history_drift
      display_name: calculate_auth_history_drift
      code: ../pricing-mlops-source
      command: >-
        python -m pip install -e . &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python scripts/components/calculate_auth_history_drift.py
        --input-dir outputs/recommendation_validity
        --output-dir outputs/auth_history_drift
        --run-id ${{inputs.run_id}}
        --storage-account ${{inputs.storage_account}}
        --validity-container artifacts
        --validity-prefix component-state/${{inputs.run_id}}/recommendation_validity
        --drift-container artifacts
        --drift-prefix component-state/${{inputs.run_id}}/auth_history_drift
      environment:
        image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
        conda_file: environment.yml
      inputs:
        storage_account:
          type: string
        run_id:
          type: string
        job_identity_client_id:
          type: string
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
    identity:
      type: user_identity
  publish_outputs:
    type: command
    compute: azureml:serverless
    depends_on:
      - calculate_operational_decision
    component:
      type: command
      name: pricing_mlops_publish_outputs
      display_name: publish_outputs
      code: ../platform-components
      command: >-
        python -m pip install azure-identity azure-storage-blob &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python platform_publish_outputs.py
        --storage-account ${{inputs.storage_account}}
        --run-artifacts-container artifacts
        --run-artifacts-prefix component-state/${{inputs.run_id}}/operational_decision
        --environment ${{inputs.environment}}
        --run-owner ${{inputs.run_owner}}
        --run-id ${{inputs.run_id}}
        --input-container raw-masked
        --input-blob-path ${{inputs.input_blob_path}}
        --compute-target azure-ml
        --trigger-type ${{inputs.trigger_type}}
        --model-repo ${{inputs.model_repo}}
        --model-ref ${{inputs.model_ref}}
        --model-commit-sha ${{inputs.model_commit_sha}}
      environment:
        image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
        conda_file: environment.yml
      inputs:
        storage_account:
          type: string
        run_id:
          type: string
        environment:
          type: string
        run_owner:
          type: string
        input_blob_path:
          type: string
        trigger_type:
          type: string
        model_repo:
          type: string
        model_ref:
          type: string
        model_commit_sha:
          type: string
        job_identity_client_id:
          type: string
        sql_enabled:
          type: string
        sql_server:
          type: string
        sql_database:
          type: string
        sql_schema:
          type: string
        sql_run_log_table:
          type: string
        sql_snapshot_table:
          type: string
        artifact_sinks:
          type: string
        optional_artifact_sinks:
          type: string
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      environment: ${{parent.inputs.environment}}
      run_owner: ${{parent.inputs.run_owner}}
      input_blob_path: ${{parent.inputs.input_blob_path}}
      trigger_type: ${{parent.inputs.trigger_type}}
      model_repo: ${{parent.inputs.model_repo}}
      model_ref: ${{parent.inputs.model_ref}}
      model_commit_sha: ${{parent.inputs.model_commit_sha}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
      sql_enabled: ${{parent.inputs.sql_enabled}}
      sql_server: ${{parent.inputs.sql_server}}
      sql_database: ${{parent.inputs.sql_database}}
      sql_schema: ${{parent.inputs.sql_schema}}
      sql_run_log_table: ${{parent.inputs.sql_run_log_table}}
      sql_snapshot_table: ${{parent.inputs.sql_snapshot_table}}
      artifact_sinks: ${{parent.inputs.artifact_sinks}}
      optional_artifact_sinks: ${{parent.inputs.optional_artifact_sinks}}
    identity:
      type: user_identity
