$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: pricing-mlops-auth-monitoring-pipeline
experiment_name: pricing-mlops
description: Pricing MLOps AUTH monitoring pipeline with visible notebook-derived steps and platform-owned publishing.
inputs:
  storage_account: mlopsstorageexample
  environment: staging
  run_owner: team46
  run_id: manual
  input_blob_path: samples/sample_pricing_v1.csv
  baseline_snapshot_container: artifacts
  baseline_snapshot_blob_path: ''
  current_history_container: raw-masked
  current_history_blob_path: samples/sample_pricing_v1.csv
  trigger_type: manual
  model_repo: tecmx-team46-pricing/pricing-mlops
  model_ref: feature/avance4-pipeline-abstraction
  model_commit_sha: unknown
  monitoring_config_version: '2026-05-07'
  monitoring_config_path: configs/drift_thresholds.json
  job_identity_client_id: ''
  sql_enabled: 'false'
  sql_server: ''
  sql_database: ''
  sql_schema: dbo
  sql_run_log_table: model_run_log
  sql_snapshot_table: model_output_snapshot_metadata
  artifact_sinks: azure_blob
  optional_artifact_sinks: azure_ml,sql_metadata
jobs:
  validate_prepare:
    type: command
    compute: azureml:serverless
    component: azureml:pricing_mlops_validate_prepare:0.1.2
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      input_blob_path: ${{parent.inputs.input_blob_path}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
    outputs:
      flow_token:
        type: uri_folder
    identity:
      type: user_identity
  build_monitoring_inputs:
    type: command
    compute: azureml:serverless
    component: azureml:pricing_mlops_build_monitoring_inputs:0.1.2
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      baseline_snapshot_container: ${{parent.inputs.baseline_snapshot_container}}
      baseline_snapshot_blob_path: ${{parent.inputs.baseline_snapshot_blob_path}}
      current_history_container: ${{parent.inputs.current_history_container}}
      current_history_blob_path: ${{parent.inputs.current_history_blob_path}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
      previous_step_token:
        type: uri_folder
        path: ${{parent.jobs.validate_prepare.outputs.flow_token}}
    outputs:
      flow_token:
        type: uri_folder
    identity:
      type: user_identity
  calculate_recommendation_validity:
    type: command
    compute: azureml:serverless
    component: azureml:pricing_mlops_calculate_recommendation_validity:0.1.2
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
      previous_step_token:
        type: uri_folder
        path: ${{parent.jobs.build_monitoring_inputs.outputs.flow_token}}
    outputs:
      flow_token:
        type: uri_folder
    identity:
      type: user_identity
  calculate_auth_history_drift:
    type: command
    compute: azureml:serverless
    component: azureml:pricing_mlops_calculate_auth_history_drift:0.1.2
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
      previous_step_token:
        type: uri_folder
        path: ${{parent.jobs.calculate_recommendation_validity.outputs.flow_token}}
    outputs:
      flow_token:
        type: uri_folder
    identity:
      type: user_identity
  calculate_operational_decision:
    type: command
    compute: azureml:serverless
    component: azureml:pricing_mlops_calculate_operational_decision:0.1.2
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
      previous_step_token:
        type: uri_folder
        path: ${{parent.jobs.calculate_auth_history_drift.outputs.flow_token}}
    outputs:
      flow_token:
        type: uri_folder
    identity:
      type: user_identity
  publish_outputs:
    type: command
    compute: azureml:serverless
    component:
      type: command
      name: pricing_mlops_publish_outputs
      display_name: publish_outputs
      code: ../platform-components
      command: >-
        test -f ${{inputs.previous_step_token}}/done.txt &&
        MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
        AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
        python platform_publish_outputs.py
        --storage-account ${{inputs.storage_account}}
        --run-artifacts-container artifacts
        --run-artifacts-prefix component-state/${{inputs.run_id}}/operational_decision
        --environment ${{inputs.environment}}
        --run-owner ${{inputs.run_owner}}
        --run-id ${{inputs.run_id}}
        --input-container raw-masked
        --input-blob-path ${{inputs.input_blob_path}}
        --compute-target azure-ml
        --trigger-type ${{inputs.trigger_type}}
        --model-repo ${{inputs.model_repo}}
        --model-ref ${{inputs.model_ref}}
        --model-commit-sha ${{inputs.model_commit_sha}}
        --monitoring-config-version ${{inputs.monitoring_config_version}}
        --monitoring-config-path configs/drift_thresholds.json
      environment: azureml:pricing-auth-monitoring-env:1
      inputs:
        storage_account:
          type: string
        run_id:
          type: string
        environment:
          type: string
        run_owner:
          type: string
        input_blob_path:
          type: string
        trigger_type:
          type: string
        model_repo:
          type: string
        model_ref:
          type: string
        model_commit_sha:
          type: string
        monitoring_config_version:
          type: string
        monitoring_config_path:
          type: string
        job_identity_client_id:
          type: string
        previous_step_token:
          type: uri_folder
    inputs:
      storage_account: ${{parent.inputs.storage_account}}
      run_id: ${{parent.inputs.run_id}}
      environment: ${{parent.inputs.environment}}
      run_owner: ${{parent.inputs.run_owner}}
      input_blob_path: ${{parent.inputs.input_blob_path}}
      trigger_type: ${{parent.inputs.trigger_type}}
      model_repo: ${{parent.inputs.model_repo}}
      model_ref: ${{parent.inputs.model_ref}}
      model_commit_sha: ${{parent.inputs.model_commit_sha}}
      monitoring_config_version: ${{parent.inputs.monitoring_config_version}}
      monitoring_config_path: ${{parent.inputs.monitoring_config_path}}
      job_identity_client_id: ${{parent.inputs.job_identity_client_id}}
      previous_step_token:
        type: uri_folder
        path: ${{parent.jobs.calculate_operational_decision.outputs.flow_token}}
    identity:
      type: user_identity
