site_name: Pricing MLOps Platform
site_description: Documentacion academica del proyecto integrador Team 46
site_author: Team 46
site_url: https://tecmx-team46-pricing.github.io/pricing-mlops-platform/
repo_url: https://github.com/tecmx-team46-pricing/pricing-mlops-platform
repo_name: pricing-mlops-platform

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: es
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Inicio: index.md
  - Proyecto:
      - Contexto y problema: project/contexto-problema.md
      - Objetivos y alcance: project/objetivos-alcance.md
      - Reporte de avance: project/reporte-avance-proyecto-integrador.md
  - Arquitectura:
      - Vista general: architecture/overview.md
      - Estructura del repo: architecture/repo-structure.md
      - Servicios Azure: architecture/azure-services.md
      - Decisiones Azure ML: architecture/azure-ml.md
  - MLOps:
      - Flujo end to end: operations/end-to-end-flow.md
      - Operacion de plataforma: operations/index.md
      - Separacion plataforma-modelo: reference/platform-model-contract.md
      - Recursos Azure ML: architecture/azure-ml.md
      - Contratos de datos: reference/data-contracts.md
  - Gobierno y evidencia:
      - Evidencia del MVP: project/evidencia.md
      - Gobierno de datos: governance/data-governance.md
      - GitHub Actions: operations/github-actions.md
      - Inventario legacy: operations/legacy-resources.md
  - Cierre:
      - Roadmap: project/roadmap.md
      - Diseno original: reference/original-technical-design.md
